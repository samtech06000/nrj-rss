name: Generate & Deploy RSS Feeds

on:
  schedule:
    # Every Monday at 23:05 UTC = 00:05 Tuesday Paris time
    # BUT the audio is from Monday 00h, so we run Monday 23:05 UTC
    # = Monday 00:05 Paris time (UTC+1)
    # Cron: minute hour day month weekday
    - cron: "5 23 * * 0"  # Sunday 23:05 UTC = Monday 00:05 Paris

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Generate RSS feeds
        run: python generate_feeds.py

      - name: Commit and push updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --cached --quiet || git commit -m "🎙️ Update RSS feeds — $(date -u +'%Y-W%V')"
          git push
