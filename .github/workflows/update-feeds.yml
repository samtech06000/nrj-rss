name: Generate & Deploy RSS Feeds

on:
  schedule:
    # Every day at 00:01 UTC = 01:01 Paris time (UTC+1)
    - cron: "1 0 * * *"
    - cron: "1 0 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate RSS feeds
        run: python generate_feeds.py

      - name: Commit and push updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --cached --quiet || git commit -m "🎙️ Update RSS feeds — $(date -u +'%Y-%m-%d')"
          git push
